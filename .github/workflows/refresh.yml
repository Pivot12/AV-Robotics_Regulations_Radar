name: Refresh

on:
  schedule:
    # Daily at 08:00 UTC
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run refresh
        env:
          JINA_API_KEY: ${{ secrets.JINA_API_KEY }}
        run: node scripts/refresh.mjs

      - name: Commit results
        run: |
          git config user.name "regulation-radar-bot"
          git config user.email "actions@github.com"
          git add public/data/changes.json data/snapshots
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: refresh regulation snapshots [skip ci]"
            git push
          fi
